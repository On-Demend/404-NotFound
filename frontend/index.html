<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AWS Nuke Configurator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>☁️ AWS Nuke Web Console</h1>
    <div class="callout">
      ⚠️ 이 도구를 사용하면 AWS 계정 내 리소스가 삭제되며, 중요한 정보가 노출되지 않도록 주의하십시오. 저희는 사용자의 정보를 저장하지 않습니다.
    </div>

    <form id="nuke-form">
      <input name="alias" placeholder="계정 별칭" required />
      <input name="iamUser" placeholder="IAM User 이름" required />
      <input name="iamProfile" placeholder="IAM Profile 이름" required />
      <input name="accountId" placeholder="계정 ID (12자리)" required pattern="\d{12}" />
      <input name="excludeId" placeholder="제외할 계정 ID (12자리)" />
      <input name="accessKey" placeholder="AWS Access Key" required />
      <input name="secretKey" placeholder="AWS Secret Key" required />
      
      <div class="regions">
        <label><input type="checkbox" name="regions" value="us-east-1"> us-east-1</label>
        <label><input type="checkbox" name="regions" value="ap-northeast-2"> ap-northeast-2</label>
        <label><input type="checkbox" name="regions" value="global" checked disabled> global</label>
      </div>

      <label><input type="checkbox" name="agree" required /> ⚠️ 위 내용에 동의합니다</label>

      <button type="submit">✅ 확인</button>
    </form>

    <div id="status"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
