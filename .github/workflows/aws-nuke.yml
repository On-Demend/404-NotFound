name: AWS Nuke Trigger

on:
  workflow_dispatch:
    inputs:
      alias:
        description: "계정 별칭"
        required: true
      iam_user:
        description: "IAM 사용자 이름"
        required: true
      iam_profile:
        description: "IAM 로그인 프로파일 이름"
        required: true
      account_id:
        description: "계정 ID"
        required: true
      exclude_id:
        description: "제외할 계정 ID"
        required: false
      regions:
        description: "리전 리스트 (쉼표로 구분)"
        required: true
      dry_run:
        description: "Dry Run 여부 (true/false)"
        required: false
        default: "true"
      aws_access_key_id:
        description: "AWS ACCESS KEY ID"
        required: true
      aws_secret_access_key:
        description: "AWS SECRET ACCESS KEY"
        required: true
  push:
    branches:
      - main
jobs:
  aws-nuke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Mask AWS credentials in logs
        run: |
          echo "::add-mask::${{ github.event.inputs.aws_access_key_id }}"
          echo "::add-mask::${{ github.event.inputs.aws_secret_access_key }}"

      - name: Set AWS credentials as environment variables
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ github.event.inputs.aws_access_key_id }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ github.event.inputs.aws_secret_access_key }}" >> $GITHUB_ENV
          echo "AWS_REGION=us-east-1" >> $GITHUB_ENV

      - name: Install AWS Nuke (exact binary)
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

          LATEST_JSON=$(curl -s https://api.github.com/repos/ekristen/aws-nuke/releases/latest)

          DOWNLOAD_URL=$(echo "$LATEST_JSON" | jq -r '.assets[] | select(.name | test("aws-nuke-.*-linux-amd64$")) | .browser_download_url')

          if [ -z "$DOWNLOAD_URL" ]; then
            echo "❌ Could not find linux-amd64 binary in release assets"
            echo "💡 Available assets:"
            echo "$LATEST_JSON" | jq -r '.assets[].name'
            exit 1
          fi

          curl -L -o aws-nuke "$DOWNLOAD_URL"
          chmod +x aws-nuke
          sudo mv aws-nuke /usr/local/bin/aws-nuke
          echo "✅ Installed AWS Nuke from $DOWNLOAD_URL"




      - name: Generate nuke-config.yaml
        run: |
          REGIONS=$(echo "${{ github.event.inputs.regions }}" | sed 's/,/","/g')
          EXCLUDE_ID="${{ github.event.inputs.exclude_id }}"
          if [ -z "$EXCLUDE_ID" ]; then
            EXCLUDE_ID="000000000000"
          fi

          echo "regions: [\"$REGIONS\",\"global\"]" > nuke-config.yaml
          echo "account-blocklist:" >> nuke-config.yaml
          echo "  - \"$EXCLUDE_ID\"" >> nuke-config.yaml
          echo "accounts:" >> nuke-config.yaml
          echo "  \"${{ github.event.inputs.account_id }}\":" >> nuke-config.yaml
          echo "    aliases:" >> nuke-config.yaml
          echo "      - \"${{ github.event.inputs.alias }}\"" >> nuke-config.yaml
          echo "    filters:" >> nuke-config.yaml
          echo "      IAMUser:" >> nuke-config.yaml
          echo "        - \"${{ github.event.inputs.iam_user }}\"" >> nuke-config.yaml
          echo "      IAMUserLoginProfile:" >> nuke-config.yaml
          echo "        - \"${{ github.event.inputs.iam_profile }}\"" >> nuke-config.yaml

      - name: Run AWS Nuke
        run: |
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            aws-nuke -c nuke-config.yaml
          else
            aws-nuke -c nuke-config.yaml --no-dry-run --force
          fi
